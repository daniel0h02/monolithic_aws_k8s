  port: 8888
  
spring:

  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${SPRING_DATASOURSE_URL:jdbc:mariadb://lgcns-daniel.c56oiy82c5g6.us-east-2.rds.amazonaws.com:3306/inspire?useSSL=true&verifyServerCertificate=false}  
    username: ${SPRING_DATASOURSE_USERNAME:root}
    password: ${SPRING_DATASOURSE_PASWWORD:12345678}
  
  jpa:
    hibernate: 
      # create, create-drop, update, none
      ddl-auto: ${SPRING_JPA_HIBERNARE_DDL_AUTO:create}
      # ВйўВєћВХюваЦ
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        # h2
        # dialect: org.hibernate.dialect.H2Dialect
        # mariadb
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true 
  
  # redis
  # docker run -d --name redis-container -p 6379:6379 redis:7.2
