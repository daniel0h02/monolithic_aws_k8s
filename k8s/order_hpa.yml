
# pod 상태 확인을 위한 metric-server 를 cluster 내에 설치하는 작업
#kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.6.3/components.yaml
#kubectl delete -f https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.6.3/components.yaml


apiVersion: autoscaling/v1

kind: HorizontalPodAutoscaler

metadata:
  name: orders-backend-hap
  namespace: lgcns
    

spec: 
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-deployment

  # pod autoscaling
  # minReplicas: 2
  # maxReplicas: 4
  # targetCPUUtilizationPercentage: 50

  # ec2 autoscaling
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 30

