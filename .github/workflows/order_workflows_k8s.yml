name: deploy order

on:
  push:
    branches:
      - main

jobs:
  # job name
  build-and-deploy:
    # runner
    runs-on: ubuntu-latest

    steps:
      - name: checkout github
        uses: actions/checkout@v2
      
      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-2

      - name: aws_eks_cluster update
        run: aws eks update-kubeconfig --region us-east-2 --name lgcns-daniel-cluster


      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1
        

      - name: build and push docker img to ecr
        env:
          REGISTRY: 933090817123.dkr.ecr.us-east-2.amazonaws.com    # .com까지만
          REPOSITORY: order-daniel-backend     # 그 뒤는 여기에
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: kubectl apply
        run: |
          kubectl apply -f k8s/order_redis.yml -n lgcns
          kubectl apply -f k8s/order_deployment.yml -n lgcns

